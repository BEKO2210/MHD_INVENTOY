<!DOCTYPE html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MHD-Inventar — Professionelle Fristenverwaltung | MHD-Tracker &amp; Barcode-Scanner PWA</title>
    <meta name="description" content="MHD-Inventar ist die professionelle Offline-PWA zur Verwaltung von Mindesthaltbarkeitsdaten. Artikel scannen, MHD tracken, ISO/DIN-Normen anzeigen und rechtzeitig benachrichtigt werden. Für Unternehmen, Werkstätten und Lager." />
    <meta name="author" content="Belkis Aslani" />

    <!-- PWA: manifest injected by vite-plugin-pwa -->
    <meta name="theme-color" content="#1a3a2a" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MHD-Inventar" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MHD-Inventar — Fristen im Griff. Bestände im Blick." />
    <meta property="og:description" content="Professionelle Offline-PWA zur MHD-Inventarverwaltung mit ISO/DIN-Normen." />
    <meta property="og:image" content="./screenshots/screenshot-desktop.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MHD-Inventar — Fristen im Griff. Bestände im Blick." />
    <meta name="twitter:description" content="Professionelle Offline-PWA zur MHD-Inventarverwaltung mit ISO/DIN-Normen." />

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; font-src 'self' https://fonts.bunny.net; img-src 'self' data: blob: https://images.openfoodfacts.org; connect-src 'self' https://world.openfoodfacts.org; media-src 'self' blob:; worker-src 'self'; manifest-src 'self';" />

    <!-- Preload -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link rel="preconnect" href="https://world.openfoodfacts.org" />
  </head>
  <body class="bg-primary-900 text-gray-100 antialiased">
    <script>
      // Apply dark mode synchronously before React renders to prevent flash
      (function() {
        var stored = localStorage.getItem('mhd-inventar-dark-mode');
        if (stored === 'false') {
          document.documentElement.classList.remove('dark');
        } else if (stored === null) {
          if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.remove('dark');
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
